{{define "search_box"}}
<div class="search-area">
    <form action="{{.Root}}/search" method="get" id="search-form">
        <input type="hidden" name="page" value="1">

        <!-- Segmented Control：搜索类型切换 -->
        <div class="content-header">
            <div class="segmented-control">
                <label class="segment {{ if or (eq .SearchType "song") (eq .SearchType "local_music") (not .SearchType) }}active{{ end }}">
                    <input type="radio" name="type" value="song"
                        {{ if or (eq .SearchType "song") (eq .SearchType "local_music") (not .SearchType) }}checked{{ end }}
                        onchange="this.form.requestSubmit()" hidden>
                    歌曲
                </label>
                <label class="segment {{ if eq .SearchType "playlist" }}active{{ end }}">
                    <input type="radio" name="type" value="playlist"
                        {{ if eq .SearchType "playlist" }}checked{{ end }}
                        onchange="this.form.requestSubmit()" hidden>
                    歌单
                </label>
                <label class="segment {{ if eq .SearchType "album" }}active{{ end }}">
                    <input type="radio" name="type" value="album"
                        {{ if eq .SearchType "album" }}checked{{ end }}
                        onchange="this.form.requestSubmit()" hidden>
                    专辑
                </label>
            </div>
        </div>

        <!-- 搜索框 -->
        <div class="search-row">
            <div class="search-input-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-keyword" name="q"
                       value="{{.Keyword}}"
                       placeholder="{{.SearchPlaceholder}}"
                       autocomplete="off">
            </div>
            <button type="submit" class="search-submit-btn" aria-label="搜索">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
    </form>
</div>

<!-- 功能按钮行 -->
<div class="action-row">
    <button type="button" class="btn btn-accent" onclick="goToRecommend()">
        <i class="fa-solid fa-fire"></i> 每日推荐
    </button>
    <button type="button" class="btn" onclick="openCollectionManager()">
        <i class="fa-solid fa-folder-open"></i> 本地歌单
    </button>
    <button type="button" class="btn" onclick="openLocalMusicPage()">
        <i class="fa-solid fa-hard-drive"></i> 本地音乐
    </button>
    <button type="button" class="btn" onclick="goToPlaylistCategories()">
        <i class="fa-solid fa-table-cells-large"></i> 歌单分类
    </button>
    <button type="button" class="btn" onclick="goToUserPlaylists()">
        <i class="fa-solid fa-heart"></i> 我的歌单
    </button>
</div>

{{ if .Error }}
<div class="error-msg">
    <i class="fa-solid fa-circle-exclamation"></i> {{ .Error }}
</div>
{{ end }}

<!-- 音源选择器（折叠） -->
<div class="source-selector" id="source-selector">
    <div class="source-actions">
        <button type="button" class="source-collapse-btn" onclick="toggleSourceSelector()" aria-controls="source-grid">
            <i class="fa-solid fa-sliders"></i> 搜索源设置
            <i class="fa-solid fa-chevron-up source-collapse-icon" style="font-size:10px;"></i>
        </button>
    </div>
    <div class="source-grid" id="source-grid">
        {{ range $source := .AllSources }}
        <label class="source-chip
            {{- range $.Selected }}{{ if eq . $source }} checked{{ end }}{{ end }}"
            data-playlist-supported="{{ index $.PlaylistSupported $source }}"
            data-album-supported="{{ index $.AlbumSupported $source }}">
            <input type="checkbox" name="sources" value="{{ $source }}" class="source-checkbox"
                {{ if $.Selected }}
                    {{ range $.Selected }}{{ if eq . $source }}checked{{ end }}{{ end }}
                {{ else }}
                    {{ range $.DefaultSources }}{{ if eq . $source }}checked{{ end }}{{ end }}
                {{ end }}>
            <span class="source-chip-name">{{ $source }}</span>
            <span class="source-chip-desc">{{ index $.SourceDescriptions $source }}</span>
        </label>
        {{ end }}
    </div>
</div>
{{end}}
